# Archivo de configuración para desplegar en Render.com

name: AI Text Processor
runtime: python-3.11
services:
  - type: web
    name: ai-text-processor
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GROQ_API_KEY
        sync: false
